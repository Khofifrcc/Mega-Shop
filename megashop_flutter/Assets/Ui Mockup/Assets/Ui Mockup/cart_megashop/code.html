<style>
    body {
      background-color: theme('colors.background');
      color: theme('colors.on-background');
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .safe-top { padding-top: theme('spacing.safe-area-top'); }
    .safe-bottom { padding-bottom: theme('spacing.safe-area-bottom'); }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="antialiased min-h-screen flex flex-col w-full max-w-[390px] mx-auto bg-surface relative overflow-x-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-edge-margin pt-safe-area-top h-[64px] bg-surface z-10 sticky top-0">
<button class="hover:bg-surface-container-low rounded-full transition-colors p-2 -ml-2 text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Cart</h1>
<button class="hover:bg-surface-container-low rounded-full transition-colors p-2 -mr-2 text-primary">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-edge-margin pb-[140px] pt-4 flex flex-col gap-stack-lg">
<!-- Cart Items List -->
<div class="flex flex-col gap-stack-md">
<!-- Item 1 -->
<div class="flex gap-4 p-4 bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant/30 relative">
<div class="w-24 h-24 rounded-lg overflow-hidden bg-surface-container-low flex-shrink-0">

</div>
<div class="flex flex-col flex-1 justify-between py-1">
<div>
<div class="flex justify-between items-start gap-2">
<h3 class="font-body-lg text-body-lg font-bold text-on-surface line-clamp-1">Aero Glide Pro 3</h3>
<button class="text-on-surface-variant hover:text-error transition-colors -mt-1 -mr-1">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Size 10 • Crimson Red</p>
</div>
<div class="flex justify-between items-center mt-2">
<span class="font-price-lg text-price-lg text-primary">$145.00</span>
<!-- Stepper -->
<div class="flex items-center bg-surface-container-low rounded-full px-2 py-1 gap-3">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-6 h-6 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="remove">remove</span>
</button>
<span class="font-label-bold text-label-bold text-on-surface w-4 text-center">1</span>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-6 h-6 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex gap-4 p-4 bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant/30 relative">
<div class="w-24 h-24 rounded-lg overflow-hidden bg-surface-container-low flex-shrink-0">
<img alt="Product Thumbnail" class="w-full h-full object-cover" data-alt="A minimalist white smart watch with a light grey band, displayed on a clean, light surface. The lighting is bright and evenly distributed, highlighting the modern, sleek design of the device. The aesthetic is clean, premium, and focused on tech utility in a well-lit environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBB2BKtmbiNStZ5nC2MnJhSh0jsuib2allgSxKiPzu7g3ucv3vNHqzmyQ7hIOsUzh-43xQ9LxxCVxFoFhr4SD1yep8IqZazqL1DMAe_0DDfwX8O8LuWP6FV-guKalRpp2cjFMdnlnCayutba0qwc10bxQrlZtEQQD3mR9RVhHMN8x1I1svM-1Xu-duzRXGJ9w6pk6E9cLHcc-kWMWIxBdulFm0-nQoaXXHA6TOWavtJAVUFqYDn19NL99be8X7bFrKDqVPC9wi6zUie"/>
</div>
<div class="flex flex-col flex-1 justify-between py-1">
<div>
<div class="flex justify-between items-start gap-2">
<h3 class="font-body-lg text-body-lg font-bold text-on-surface line-clamp-1">Tempo Smartwatch Series 5</h3>
<button class="text-on-surface-variant hover:text-error transition-colors -mt-1 -mr-1">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">42mm • Frost White</p>
</div>
<div class="flex justify-between items-center mt-2">
<span class="font-price-lg text-price-lg text-primary">$299.00</span>
<!-- Stepper -->
<div class="flex items-center bg-surface-container-low rounded-full px-2 py-1 gap-3">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-6 h-6 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="remove">remove</span>
</button>
<span class="font-label-bold text-label-bold text-on-surface w-4 text-center">1</span>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-6 h-6 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Promo Code Entry -->
<div class="flex items-center gap-2">
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">local_offer</span>
<input class="w-full h-12 bg-surface-container-low rounded-xl pl-10 pr-4 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant border-none focus:ring-1.5 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="Promo code" type="text"/>
</div>
<button class="h-12 px-6 rounded-xl bg-surface-container-high text-primary font-label-bold text-label-bold hover:bg-surface-variant transition-colors">Apply</button>
</div>
<!-- Order Summary -->
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant/30 flex flex-col gap-4">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Order Summary</h2>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Subtotal (2 items)</span>
<span class="font-body-lg text-body-lg font-semibold text-on-surface">$444.00</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Shipping</span>
<span class="font-body-lg text-body-lg font-semibold text-primary">Free</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Tax</span>
<span class="font-body-lg text-body-lg font-semibold text-on-surface">$35.52</span>
</div>
</div>
<div class="h-[1px] w-full bg-surface-variant my-2"></div>
<div class="flex justify-between items-center">
<span class="font-headline-sm text-headline-sm text-on-surface">Total</span>
<span class="font-display-lg-mobile text-display-lg-mobile text-primary">$479.52</span>
</div>
</div>
</main>
<!-- Sticky Bottom Checkout Action -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md pb-safe-area-bottom pt-4 px-edge-margin z-40 border-t border-surface-variant/20 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
<button class="w-full h-14 bg-[#F59E0B] text-white rounded-[16px] font-headline-sm text-headline-sm flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-lg shadow-amber-500/30">
<span>Checkout</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>

<!-- Navigation shell suppressed for transactional screen -->
