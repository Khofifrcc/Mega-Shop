<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MegaShop - Create Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#653e00",
                    "on-surface-variant": "#4a4455",
                    "primary-fixed": "#eaddff",
                    "tertiary-container": "#a15100",
                    "surface-container": "#e9edff",
                    "surface-bright": "#f9f9ff",
                    "primary": "#630ed4",
                    "surface-container-high": "#e1e8fd",
                    "surface-tint": "#732ee4",
                    "on-surface": "#141b2b",
                    "surface-variant": "#dce2f7",
                    "on-background": "#141b2b",
                    "secondary-fixed": "#ffddb8",
                    "on-primary-fixed-variant": "#5a00c6",
                    "surface": "#f9f9ff",
                    "surface-container-low": "#f1f3ff",
                    "primary-fixed-dim": "#d2bbff",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#dce2f7",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#25005a",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#edf0ff",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f9f9ff",
                    "secondary": "#855300",
                    "primary-container": "#7c3aed",
                    "tertiary": "#7d3d00",
                    "surface-dim": "#d3daef",
                    "tertiary-fixed-dim": "#ffb784",
                    "tertiary-fixed": "#ffdcc6",
                    "on-tertiary-fixed": "#301400",
                    "outline": "#7b7487",
                    "inverse-surface": "#293040",
                    "error": "#ba1a1a",
                    "on-secondary-container": "#684000",
                    "on-tertiary-container": "#ffe0cd",
                    "on-secondary-fixed": "#2a1700",
                    "secondary-container": "#fea619",
                    "inverse-primary": "#d2bbff",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#ede0ff",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#ffb95f",
                    "on-tertiary-fixed-variant": "#713700",
                    "error-container": "#ffdad6",
                    "outline-variant": "#ccc3d8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "8px",
                    "stack-md": "16px",
                    "safe-area-bottom": "34px",
                    "safe-area-top": "59px",
                    "edge-margin": "16px",
                    "gutter": "12px",
                    "stack-lg": "24px"
            },
            "fontFamily": {
                    "headline-sm": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "display-lg-mobile": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "price-lg": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "label-bold": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "display-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "800"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-bold": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            display: none;
        }
        
        .tab-active {
            background-color: theme('colors.primary');
            color: theme('colors.on-primary');
        }
        
        .tab-inactive {
            background-color: theme('colors.surface-container-high');
            color: theme('colors.on-surface-variant');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased flex justify-center items-center min-h-screen">
<!-- Mobile Device Container -->
<div class="w-full max-w-[390px] h-[844px] bg-background relative overflow-hidden flex flex-col shadow-2xl md:rounded-[2.5rem] md:border-[8px] md:border-inverse-surface">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-edge-margin pt-safe-area-top h-[64px] bg-surface dark:bg-surface-dim z-40 shrink-0">
<button class="flex items-center justify-center p-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest rounded-full transition-colors active:opacity-80">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="location_on" data-weight="regular">location_on</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">
                MegaShop
            </div>
<button class="flex items-center justify-center p-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest rounded-full transition-colors active:opacity-80">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="search" data-weight="regular">search</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto w-full flex flex-col pb-[120px]">
<!-- Tab Navigation -->
<div class="px-edge-margin pt-stack-sm pb-stack-md flex gap-gutter">
<button class="flex-1 py-3 px-4 rounded-full font-label-bold text-label-bold text-center transition-colors tab-active" id="tab-regular" onclick="switchTab('regular')">
                    Regular Post
                </button>
<button class="flex-1 py-3 px-4 rounded-full font-label-bold text-label-bold text-center transition-colors tab-inactive" id="tab-product" onclick="switchTab('product')">
                    Product Post
                </button>
</div>
<!-- REGULAR POST VIEW -->
<div class="flex flex-col gap-stack-lg px-edge-margin w-full animate-[fadeIn_0.3s_ease-out]" id="view-regular">
<!-- Upload Area -->
<div class="w-full aspect-[4/5] bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-stack-sm cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-on-primary-fixed text-3xl" data-icon="add_photo_alternate" data-weight="regular">add_photo_alternate</span>
</div>
<span class="font-headline-sm text-headline-sm text-on-surface">Upload Media</span>
<span class="font-body-md text-body-md text-on-surface-variant text-center px-4">Drag and drop or tap to select photos/videos</span>
</div>
<!-- Caption Input -->
<div class="w-full flex flex-col gap-2">
<textarea class="w-full bg-surface-container border-none rounded-xl p-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary focus:bg-surface-bright transition-all resize-none h-32" placeholder="Write an engaging caption..."></textarea>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-4 rounded-xl shadow-[0_4px_20px_rgba(99,14,212,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4">
                    Post Sekarang
                    <span class="material-symbols-outlined text-xl" data-icon="send" data-weight="fill" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
<!-- PRODUCT POST VIEW (Hidden by default) -->
<div class="hidden flex flex-col gap-stack-lg px-edge-margin w-full animate-[fadeIn_0.3s_ease-out]" id="view-product">
<!-- Horizontal Upload Area (Gallery Style) -->
<div class="w-full flex gap-gutter overflow-x-auto pb-2 snap-x">
<div class="w-[120px] h-[120px] shrink-0 bg-surface-container-low rounded-xl border-2 border-dashed border-primary/50 flex flex-col items-center justify-center gap-1 cursor-pointer snap-start">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="add" data-weight="regular">add</span>
<span class="font-label-bold text-label-bold text-primary">Add Photo</span>
</div>
<!-- Placeholder empty slots -->
<div class="w-[120px] h-[120px] shrink-0 bg-surface-container-lowest rounded-xl border border-outline-variant snap-start opacity-50"></div>
<div class="w-[120px] h-[120px] shrink-0 bg-surface-container-lowest rounded-xl border border-outline-variant snap-start opacity-50"></div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-stack-md w-full">
<!-- Product Name -->
<div class="relative w-full">
<input class="w-full bg-surface-container border-none rounded-xl px-4 pt-6 pb-2 font-body-lg text-body-lg text-on-surface focus:ring-2 focus:ring-secondary-container transition-all peer" id="prod-name" placeholder=" " type="text"/>
<label class="absolute left-4 top-2 font-label-bold text-label-bold text-on-surface-variant transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:font-body-md peer-placeholder-shown:text-body-md peer-focus:top-2 peer-focus:font-label-bold peer-focus:text-label-bold peer-focus:text-secondary-container" for="prod-name">Product Name</label>
</div>
<!-- Price Input with Rp prefix -->
<div class="relative w-full flex items-center bg-surface-container rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-secondary-container transition-all">
<div class="px-4 font-headline-sm text-headline-sm text-on-surface-variant border-r border-outline-variant/30 h-full flex items-center bg-surface-container-high">
                            Rp
                        </div>
<input class="flex-1 bg-transparent border-none p-4 font-price-lg text-price-lg text-on-surface focus:ring-0" placeholder="0" type="number"/>
</div>
<!-- Description -->
<div class="w-full">
<textarea class="w-full bg-surface-container border-none rounded-xl p-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-secondary-container transition-all resize-none h-28" placeholder="Describe the product details, condition, and specs..."></textarea>
</div>
</div>
<!-- Submit Button (Amber/Secondary Container) -->
<button class="w-full bg-secondary-container text-on-secondary-container font-headline-sm text-headline-sm py-4 rounded-xl shadow-[0_4px_20px_rgba(254,166,25,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2">
<span class="material-symbols-outlined text-xl" data-icon="storefront" data-weight="fill" style="font-variation-settings: 'FILL' 1;">storefront</span>
                    Post Produk
                </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full max-w-[390px] z-50 flex justify-around items-center px-edge-margin pb-safe-area-bottom pt-2 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-lg rounded-t-xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-on-surface-variant/60 hover:bg-primary/10 dark:hover:bg-primary-fixed/10 transition-colors w-16 h-14 rounded-xl active:scale-95 duration-150 group" href="#">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="home" data-weight="regular">home</span>
<span class="font-label-bold text-label-bold">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-on-surface-variant/60 hover:bg-primary/10 dark:hover:bg-primary-fixed/10 transition-colors w-16 h-14 rounded-xl active:scale-95 duration-150 group" href="#">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="movie" data-weight="regular">movie</span>
<span class="font-label-bold text-label-bold">Reels</span>
</a>
<!-- Active Tab: Post -->
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold bg-primary/10 dark:bg-primary-fixed/10 transition-colors w-16 h-14 rounded-xl active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-bold text-label-bold">Post</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-on-surface-variant/60 hover:bg-primary/10 dark:hover:bg-primary-fixed/10 transition-colors w-16 h-14 rounded-xl active:scale-95 duration-150 group" href="#">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="shopping_cart" data-weight="regular">shopping_cart</span>
<span class="font-label-bold text-label-bold">Cart</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-on-surface-variant/60 hover:bg-primary/10 dark:hover:bg-primary-fixed/10 transition-colors w-16 h-14 rounded-xl active:scale-95 duration-150 group" href="#">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="person" data-weight="regular">person</span>
<span class="font-label-bold text-label-bold">Profile</span>
</a>
</nav>
</div>
<script>
        function switchTab(tabId) {
            const regularView = document.getElementById('view-regular');
            const productView = document.getElementById('view-product');
            const tabRegularBtn = document.getElementById('tab-regular');
            const tabProductBtn = document.getElementById('tab-product');

            if (tabId === 'regular') {
                regularView.classList.remove('hidden');
                productView.classList.add('hidden');
                
                tabRegularBtn.className = "flex-1 py-3 px-4 rounded-full font-label-bold text-label-bold text-center transition-colors tab-active";
                tabProductBtn.className = "flex-1 py-3 px-4 rounded-full font-label-bold text-label-bold text-center transition-colors tab-inactive";
            } else {
                regularView.classList.add('hidden');
                productView.classList.remove('hidden');
                
                tabRegularBtn.className = "flex-1 py-3 px-4 rounded-full font-label-bold text-label-bold text-center transition-colors tab-inactive";
                tabProductBtn.className = "flex-1 py-3 px-4 rounded-full font-label-bold text-label-bold text-center transition-colors tab-active bg-secondary-container text-on-secondary-container";
                
                // Ensure specific colors for the product tab active state to match the amber theme
                tabProductBtn.style.backgroundColor = 'theme("colors.secondary-container")';
                tabProductBtn.style.color = 'theme("colors.on-secondary-container")';
            }
        }
    </script>
</body></html>
