<body class="bg-surface-variant text-on-surface antialiased flex flex-col items-center gap-8 py-8">
<!-- Container for Presentation (Simulating Mobile Screens) -->
<div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl justify-center items-center">
<!-- SUCCESS STATE -->
<main class="w-full max-w-[390px] h-[844px] bg-surface relative overflow-hidden flex flex-col justify-between shadow-2xl rounded-[32px] border-[8px] border-surface-container-highest">
<!-- Top App Bar (Minimal for Transactional Splash) -->
<header class="flex justify-between items-center w-full px-edge-margin pt-safe-area-top h-[64px] bg-surface z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Main Content -->
<div class="flex-1 flex flex-col items-center justify-center px-edge-margin text-center pb-20">
<!-- Illustration Placeholder -->
<div class="w-64 h-64 mb-stack-lg rounded-full bg-surface-container flex items-center justify-center relative overflow-hidden">
<!-- Ambient Glow -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl"></div>
<img alt="Success Illustration" class="w-48 h-48 object-cover rounded-full mix-blend-multiply opacity-90 z-10" data-alt="A sleek, modern 3D illustration of a stylized shopping bag with a vibrant, glowing checkmark emerging from it, set against a pristine, soft-white background. The lighting is studio-quality, casting subtle, diffused shadows that emphasize a high-end, minimalist aesthetic. The color palette features pristine whites, deep blacks, and a pop of vivid, energetic purple to signify success in a premium digital environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWyD3A3IL2bA2mvJzVfwgsnUBmkfCbOWVcyP7N8LH2VMAix_QIxP6PynBUFoDVueMbxvYIWZrpLhuyOHbIwDKBZ8vv2eAoAVfoGGbUUN7hu0wNGM_LbtOwJ9K-6-R1i7kKlOWFuy62alF1rZne7rFZRN1CR1qtRp0Tck1-TnKMYscaXVBw0KxyMF-IsGIjCDSQZthC1xrkK6Lz2BZVeQP0E-o1C4usTujD9RH5Qms6xMdGTV_tFWyjfaB-UeRJ5OupX1X6akAyjcZ7"/>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-stack-sm">Order Berhasil!</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-md">Terima kasih telah berbelanja di MegaShop.</p>
<!-- Order Details Card -->
<div class="bg-surface-container-low w-full rounded-xl p-stack-md flex justify-between items-center border border-outline-variant/30">
<span class="font-body-md text-body-md text-on-surface-variant">Nomor Pesanan</span>
<span class="font-headline-sm text-headline-sm text-on-surface">#ORD-9824XQ</span>
</div>
</div>
<!-- Bottom Action Area -->
<div class="px-edge-margin pb-safe-area-bottom pt-stack-md bg-surface border-t border-outline-variant/10">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2 mb-stack-sm">
                    Lihat Pesanan
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
<button class="w-full bg-transparent text-primary font-label-bold text-label-bold py-4 rounded-xl hover:bg-primary/5 transition-colors">
                    Kembali ke Beranda
                </button>
</div>
</main>
<!-- ERROR STATE -->
<main class="w-full max-w-[390px] h-[844px] bg-surface relative overflow-hidden flex flex-col justify-between shadow-2xl rounded-[32px] border-[8px] border-surface-container-highest">
<!-- Top App Bar -->
<header class="flex justify-between items-center w-full px-edge-margin pt-safe-area-top h-[64px] bg-surface z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Main Content -->
<div class="flex-1 flex flex-col items-center justify-center px-edge-margin text-center pb-20">
<!-- Error Icon Area -->
<div class="w-32 h-32 mb-stack-lg rounded-full bg-error-container flex items-center justify-center relative">
<!-- Pulse effect rings -->
<div class="absolute inset-0 rounded-full border border-error/20 animate-ping" style="animation-duration: 2s;"></div>
<div class="absolute -inset-4 rounded-full border border-error/10 animate-ping" style="animation-duration: 3s;"></div>
<span class="material-symbols-outlined text-error" style="font-size: 64px; font-variation-settings: 'FILL' 1;">
                        error
                    </span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-stack-sm">Gagal</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-lg max-w-[280px]">
                    Maaf, terjadi kesalahan saat memproses pesanan Anda. Silakan periksa koneksi atau metode pembayaran.
                </p>
<!-- Support Link -->
<a class="font-label-bold text-label-bold text-outline hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined" style="font-size: 16px;">help</span>
                    Hubungi Customer Service
                </a>
</div>
<!-- Bottom Action Area -->
<div class="px-edge-margin pb-safe-area-bottom pt-stack-md bg-surface">
<button class="w-full bg-error text-on-error font-label-bold text-label-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-size: 18px;">refresh</span>
                    Coba Lagi
                </button>
</div>
</main>
</div>
